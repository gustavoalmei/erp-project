name: erp-project
services:
  database:
    image: postgres:15-alpine
    container_name: erp-postgres
    environment:
      POSTGRES_USER: erp-project-user
      POSTGRES_PASSWORD: erp-project-password
      POSTGRES_DB: erp-project-db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
